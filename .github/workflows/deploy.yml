name: Django CI/CD

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/sarthak/notes-app
            sudo git fetch origin master
            sudo git reset --hard origin/master
            sudo /home/sarthak/notes-app/venv/bin/pip install -r requirements.txt
            sudo /home/sarthak/notes-app/venv/bin/python manage.py migrate
            sudo systemctl restart gunicorn